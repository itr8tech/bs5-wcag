name: Accessibility Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  accessibility-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Verify docs has dist files
        run: |
          if [ ! -d "docs/dist" ]; then
            echo "Error: docs/dist directory not found"
            exit 1
          fi
          echo "✓ docs/dist directory exists"

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.13.x

      - name: Install axe-core CLI
        run: npm install -g @axe-core/cli

      - name: Start server
        run: |
          npx http-server -p 8080 &
          sleep 3

      - name: Run Lighthouse CI
        run: lhci autorun
        continue-on-error: true

      - name: Run axe accessibility tests
        run: |
          axe http://localhost:8080/docs/index.html \
            --exit \
            --tags wcag2a,wcag2aa,wcag2aaa \
            --stdout > axe-results.json || true

          # Display results
          cat axe-results.json

          # Check for violations
          if grep -q '"violations":\s*\[\s*\]' axe-results.json; then
            echo "✓ No accessibility violations found!"
            exit 0
          else
            echo "✗ Accessibility violations detected"
            exit 1
          fi

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-results
          path: .lighthouseci/

      - name: Upload axe results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: axe-results
          path: axe-results.json

      - name: Comment PR with results
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            let comment = '## 🔍 Accessibility Audit Results\n\n';

            try {
              const axeResults = JSON.parse(fs.readFileSync('axe-results.json', 'utf8'));
              const violations = axeResults.violations || [];

              comment += `### axe-core Results\n`;
              comment += `- **Violations:** ${violations.length}\n`;

              if (violations.length > 0) {
                comment += '\n#### Violations:\n';
                violations.forEach(v => {
                  comment += `- **${v.id}** (${v.impact}): ${v.description}\n`;
                  comment += `  - Nodes affected: ${v.nodes.length}\n`;
                });
              } else {
                comment += '\n✅ No accessibility violations found!\n';
              }
            } catch (e) {
              comment += '\n⚠️ Could not parse axe results\n';
            }

            comment += '\n### Lighthouse CI\n';
            comment += 'See artifacts for detailed Lighthouse report.\n';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
