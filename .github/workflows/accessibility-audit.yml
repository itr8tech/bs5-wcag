name: Accessibility Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  accessibility-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Verify docs has dist files
        run: |
          if [ ! -d "docs/dist" ]; then
            echo "Error: docs/dist directory not found"
            exit 1
          fi
          echo "✓ docs/dist directory exists"

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.13.x

      - name: Setup Chrome and ChromeDriver
        run: |
          # Install browser-driver-manager to get matching versions
          npm install -g browser-driver-manager
          # Install matching Chrome and ChromeDriver
          npx browser-driver-manager install chrome

      - name: Start server
        run: |
          npx http-server -p 8080 &
          sleep 3

      - name: Run Lighthouse CI
        run: lhci autorun
        continue-on-error: true

      - name: Run axe accessibility tests with Puppeteer
        run: |
          # Install axe with puppeteer (no chromedriver issues)
          npm install --no-save @axe-core/puppeteer puppeteer

          # Create test script
          cat > axe-test.js << 'AXESCRIPT'
          const { AxePuppeteer } = require('@axe-core/puppeteer');
          const puppeteer = require('puppeteer');

          (async () => {
            const browser = await puppeteer.launch({
              headless: 'new',
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();
            await page.goto('http://localhost:8080/docs/index.html');

            const results = await new AxePuppeteer(page)
              .withTags(['wcag2a', 'wcag2aa', 'wcag2aaa'])
              .analyze();

            await browser.close();

            // Save results
            require('fs').writeFileSync('axe-results.json', JSON.stringify(results, null, 2));

            console.log('\n=== Axe Accessibility Results ===');
            console.log(`Violations: ${results.violations.length}`);
            console.log(`Passes: ${results.passes.length}`);
            console.log(`Incomplete: ${results.incomplete.length}`);

            if (results.violations.length > 0) {
              console.log('\n❌ Violations found:');
              results.violations.forEach(violation => {
                console.log(`\n- ${violation.id} (${violation.impact})`);
                console.log(`  ${violation.description}`);
                console.log(`  Help: ${violation.helpUrl}`);
                console.log(`  Affected nodes: ${violation.nodes.length}`);
              });
              process.exit(1);
            } else {
              console.log('\n✅ No accessibility violations found!');
              process.exit(0);
            }
          })();
          AXESCRIPT

          # Run the test
          node axe-test.js

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-results
          path: .lighthouseci/

      - name: Upload axe results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: axe-results
          path: axe-results.json

      - name: Comment PR with results
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            let comment = '## 🔍 Accessibility Audit Results\n\n';

            try {
              const axeResults = JSON.parse(fs.readFileSync('axe-results.json', 'utf8'));
              const violations = axeResults.violations || [];

              comment += `### axe-core Results\n`;
              comment += `- **Violations:** ${violations.length}\n`;

              if (violations.length > 0) {
                comment += '\n#### Violations:\n';
                violations.forEach(v => {
                  comment += `- **${v.id}** (${v.impact}): ${v.description}\n`;
                  comment += `  - Nodes affected: ${v.nodes.length}\n`;
                });
              } else {
                comment += '\n✅ No accessibility violations found!\n';
              }
            } catch (e) {
              comment += '\n⚠️ Could not parse axe results\n';
            }

            comment += '\n### Lighthouse CI\n';
            comment += 'See artifacts for detailed Lighthouse report.\n';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
