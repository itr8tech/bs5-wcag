name: Test Build

on:
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Check dist files exist
        run: |
          if [ ! -f "dist/css/bs5-wcag.css" ]; then
            echo "Error: bs5-wcag.css not generated"
            exit 1
          fi
          if [ ! -f "dist/js/bs5-wcag.js" ]; then
            echo "Error: bs5-wcag.js not generated"
            exit 1
          fi
          echo "✓ All build files generated successfully"

      - name: Check file sizes
        run: |
          echo "Build artifact sizes:"
          ls -lh dist/css/
          ls -lh dist/js/
